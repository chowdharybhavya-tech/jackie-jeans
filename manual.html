<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manual Onboarding</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>Manual Onboarding</h1>

    <form id="onboardingForm">

        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="Enter your full name" required>

        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter your email" required>

        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" placeholder="Enter your phone number" required>

        <label>Waist Size (inches)</label>
        <input type="number" id="waist" required>

        <label>Preferred Fit</label>
        <select id="fit" required>
            <option value="">Select Fit</option>
            <option>Slim</option>
            <option>Regular</option>
            <option>Relaxed</option>
        </select>

        <label>Favorite Jeans Brands</label>
        <input type="text" id="brands" placeholder="Levi's, Wrangler, Lee" required>

        <label>Size in Those Brands</label>
        <input type="text" id="brandSize" placeholder="32, M, etc." required>

        <label>Height</label>
        <input type="text" id="height" placeholder="5'8&quot;" required>

        <label>Weight (Optional)</label>
        <input type="text" id="weight" placeholder="70 kg">

        <button type="submit">Submit</button>

    </form>

</div>

<script src="script.js"></script>

</body>
</html>
