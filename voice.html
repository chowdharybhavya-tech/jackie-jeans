<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jackie Smart Fit AI</title>

    <style>

        body{
            margin:0;
            font-family:Arial, Helvetica, sans-serif;
            background:#f4f4f4;

            display:flex;
            justify-content:center;
            align-items:center;

            height:100vh;
        }

        .container{

            width:500px;
            background:white;

            padding:30px;

            border-radius:15px;

            text-align:center;

            box-shadow:0px 0px 15px rgba(0,0,0,0.2);

        }

        h1{

            color:#1f4ed8;

        }

        p{

            color:gray;

            margin-bottom:30px;

        }

        button{

            padding:15px 30px;

            font-size:18px;

            border:none;

            border-radius:10px;

            background:#2563eb;

            color:white;

            cursor:pointer;

        }

        button:hover{

            background:#1d4ed8;

        }

        #status{

            margin-top:30px;

            padding:15px;

            background:#eef2ff;

            border-radius:10px;

            font-size:18px;

        }

    </style>

</head>

<body>

<div class="container">

<h1>🎤 Jackie Smart Fit AI</h1>

<p>Talk with your AI Stylist</p>

<button id="startCall">

Start Voice Onboarding

</button>

<div id="status">

Press the button to begin.

</div>

</div>

<script type="module" src="script.js"></script>

</body>
</html>
